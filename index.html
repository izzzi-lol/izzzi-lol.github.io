<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TERMINAL O5-COMMAND</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=IBM+Plex+Sans:wght@400;600;700&family=Inter:wght@400;700&display=swap">
    <link rel="stylesheet" type='text/css' media='screen' href="css/terminal.css">
</head>
<body class="locked">

<div id="auth-overlay">
    <div id="auth-terminal" style="width: 80%; max-width: 500px; height: 150px; overflow: hidden; margin-bottom: 20px;"></div>
    <div class="auth-scanner" style="width: 200px; height: 100px; border: 1px solid #333; position: relative; display: flex; align-items: center; justify-content: center;">
        <div class="scan-line"></div>
        <span style="font-size: 0.7em;">RETINA SCAN</span>
    </div>
</div>

<div id="container">
    <div id="console-area">
        <span class="prompt">O5@SCIPNET:~$</span>
        <input type="text" id="cmd-input" placeholder="Введите GET [имя_объекта]" autocomplete="off" autofocus>
    </div>

    <div id="dossier-output">
        <div style="text-align:center; margin-top: 20vh; color: #333;">
            <p>[ СИСТЕМА ОЖИДАНИЯ ВВОДА ]</p>
            <p style="font-size: 0.8em;">Используйте команду GET для доступа к архивам.</p>
        </div>

    </div>
</div>
<script src="js/terminal/main.js"></script>
</body>
</html>
