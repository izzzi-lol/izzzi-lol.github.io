<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TERMINAL O5-COMMAND</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=IBM+Plex+Sans:wght@400;600;700&family=Inter:wght@400;700&display=swap">
    <style>
        :root {
            --accent: 28, 37, 56; 
            --head-font: 'IBM Plex Sans', sans-serif;
            --mono-font: 'JetBrains Mono', monospace;
            --page-font: 'Inter', sans-serif;
            --danger-color: #E6283C;
            --terminal-green: #00ff41;
        }

        /* --- АВТОРИЗАЦИЯ --- */
        #auth-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 10000; display: none;
            flex-direction: column; justify-content: center; align-items: center;
            font-family: var(--mono-font); color: var(--terminal-green);
        }
        #auth-terminal { width: 90%; max-width: 600px; height: 200px; overflow: hidden; margin-bottom: 20px; font-size: 0.8em; }
        .auth-scanner { width: 200px; height: 100px; border: 1px solid #333; position: relative; display: flex; align-items: center; justify-content: center; font-size: 0.6em; }
        .scan-line { position: absolute; width: 100%; height: 2px; background: var(--terminal-green); box-shadow: 0 0 10px var(--terminal-green); top: 0; animation: scan 2s infinite linear; }
        @keyframes scan { 0% { top: 0; } 50% { top: 100%; } 100% { top: 0; } }
        body.locked { overflow: hidden; }

        /* --- ОСНОВНОЙ КОНТЕЙНЕР --- */
        body { font-family: var(--page-font); background-color: #0a0a0a; color: #d1d1d1; margin: 0; padding: 10px; }
        #container { max-width: 900px; margin: 0 auto; border: 1px solid #333; background: #111; padding: 20px; min-height: 90vh; }
        #console-area { font-family: var(--mono-font); background: #000; padding: 12px; border-left: 3px solid var(--terminal-green); margin-bottom: 20px; display: flex; }
        .prompt { color: var(--terminal-green); font-weight: bold; margin-right: 10px; }
        #cmd-input { background: transparent; border: none; color: #fff; font-family: var(--mono-font); font-size: 16px; flex: 1; outline: none; }

        /* --- ЭФФЕКТЫ ДЕШИФРОВКИ --- */
        .word { position: relative; display: inline-block; color: transparent; margin-right: 4px; transition: color 0.05s; }
        .word.revealed { color: inherit; }
        .word::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #fff; transform: scaleX(0); transition: transform 0.15s; }
        .word.decrypting::after { transform: scaleX(1); transform-origin: left; }
        .word.revealed::after { transform: scaleX(0); transform-origin: right; }

        /* --- ФОРМАТИРОВАНИЕ --- */
        .glitch-title { color: #a200ff; font-family: var(--head-font); font-size: 1.8em; text-align: center; display: block; margin: 20px 0; text-transform: uppercase; }
        .danger-diamond { border: 2px solid var(--danger-color); background: rgba(230, 40, 60, 0.1); padding: 15px; margin: 20px 0; text-align: center; color: #ff4d4d; }
        .scp-image-container { border: 1px solid #333; background: #050505; padding: 5px; margin: 20px 0; width: 100%; opacity: 0; transition: opacity 1s; }
        .scp-image-container.visible { opacity: 1; }
        .scp-image-container img { width: 100%; height: auto; display: block; }
        .scp-image-caption { font-family: var(--mono-font); font-size: 0.7em; color: #888; text-align: center; padding: 5px; }
        blockquote { border-left: 3px solid #444; background: #1a1a1a; padding: 15px; margin: 15px 0; opacity: 0; transition: opacity 0.5s; }
        blockquote.visible { opacity: 1; }
        .table-wrapper { overflow-x: auto; margin: 20px 0; opacity: 0; transition: opacity 0.5s; }
        .table-wrapper.visible { opacity: 1; }
        .table6 { width: 100%; border-collapse: collapse; min-width: 400px; }
        .table6 td { border: 1px solid #333; padding: 8px; font-size: 0.85em; }
        .table6 tr:first-child { background: rgba(146, 0, 255, 0.2); color: #fff; font-weight: bold; }
        .clearfix { clear: both; }

        @media (min-width: 600px) { 
            #container { padding: 40px; } 
            .scp-image-container { float: right; width: 300px; margin-left: 20px; }
        }
    </style>
</head>
<body class="locked">

<div id="auth-overlay">
    <div id="auth-terminal"></div>
    <div class="auth-scanner"><div class="scan-line"></div>RETINA SCAN</div>
</div>

<div id="container">
    <div id="console-area">
        <span class="prompt">O5@TERMINAL:~$</span>
        <input type="text" id="cmd-input" placeholder="GET [name]" autocomplete="off" autofocus>
    </div>
    <div id="dossier-output"></div>
</div>

<script>
    const input = document.getElementById('cmd-input');
    const output = document.getElementById('dossier-output');
    const authOverlay = document.getElementById('auth-overlay');
    const authTerminal = document.getElementById('auth-terminal');

    // --- ЛОГИКА АВТОРИЗАЦИИ ---
    async function startAuth() {
        authOverlay.style.display = 'flex';
        const logs = ["> BOOTING...", "> VERIFYING BIOMETRICS...", "> ACCESS GRANTED."];
        for (let l of logs) {
            let d = document.createElement('div'); d.textContent = l;
            authTerminal.appendChild(d);
            await new Promise(r => setTimeout(r, 600));
        }
        setTimeout(() => {
            authOverlay.style.opacity = '0';
            setTimeout(() => { 
                authOverlay.style.display = 'none'; 
                document.body.classList.remove('locked');
                localStorage.setItem('last_session', Date.now());
            }, 800);
        }, 500);
    }

    window.onload = () => {
        const last = localStorage.getItem('last_session');
        if (!last || (Date.now() - last) > 900000) startAuth();
        else { authOverlay.style.display = 'none'; document.body.classList.remove('locked'); }
    };

    // --- ОБРАБОТКА КОМАНД ---
    input.addEventListener('keypress', async (e) => {
        if (e.key === 'Enter') {
            const cmd = input.value.trim();
            input.value = '';
            if (cmd.toUpperCase().startsWith('GET ')) {
                loadDossier(cmd.substring(4).toLowerCase());
                input.blur();
            }
        }
    });

    async function loadDossier(name) {
        output.innerHTML = '<p style="color:cyan">[DECRYPTING...]</p>';
        try {
            const res = await fetch(`dossiers/${name}.txt`);
            if (!res.ok) throw new Error();
            const text = await res.text();
            output.innerHTML = '';
            await renderStepByStep(text);
        } catch {
            output.innerHTML = '<div class="danger-diamond">ERROR: FILE NOT FOUND</div>';
        }
    }

    // --- ПОСЛОВНЫЙ РЕНДЕРИНГ ---
    async function renderStepByStep(content) {
        const lines = content.split('\n');
        let currentTable = null;

        for (let line of lines) {
            line = line.trim();
            if (!line) continue;

            let el;
            if (line.startsWith('[TITLE]')) {
                el = document.createElement('span'); el.className = 'glitch-title';
                el.textContent = line.replace('[TITLE]', '');
            } else if (line.startsWith('[DANGER]')) {
                el = document.createElement('div'); el.className = 'danger-diamond';
                el.textContent = line.replace('[DANGER]', '');
            } else if (line.startsWith('[IMAGE]')) {
                let p = line.replace('[IMAGE]', '').split('||');
                el = document.createElement('div'); el.className = 'scp-image-container';
                el.innerHTML = `<img src="${p[0].trim()}"><div class="scp-image-caption">${p[1]||""}</div>`;
            } else if (line.startsWith('[QUOTE]')) {
                el = document.createElement('blockquote');
            } else if (line.startsWith('[TABLE6]')) {
                let wrapper = document.createElement('div'); wrapper.className = 'table-wrapper';
                currentTable = document.createElement('table'); currentTable.className = 'table6';
                wrapper.appendChild(currentTable); el = wrapper;
            } else {
                // Обработка строк таблицы или обычного текста
                if (currentTable && line.includes('||')) {
                    let tr = document.createElement('tr');
                    line.split('||').forEach(c => { let td = document.createElement('td'); td.textContent = c.trim(); tr.appendChild(td); });
                    currentTable.appendChild(tr);
                    continue; 
                } else {
                    currentTable = null; // Закрываем таблицу, если пошел обычный текст
                    el = document.createElement('p');
                    // Форматирование жирный/курсив перед анимацией
                    let htmlLine = line.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\/\/(.*?)\/\//g, '<em>$1</em>');
                    
                    // Создаем временный элемент, чтобы разбить именно слова, не ломая HTML-теги
                    let temp = document.createElement('div'); temp.innerHTML = htmlLine;
                    let words = temp.innerHTML.split(' ');
                    
                    words.forEach(w => {
                        let s = document.createElement('span'); s.className = 'word'; s.innerHTML = w;
                        el.appendChild(s); el.appendChild(document.createTextNode(' '));
                    });
                }
            }

            output.appendChild(el);

            // Анимация
            if (el.querySelectorAll('.word').length > 0) {
                for (let w of el.querySelectorAll('.word')) {
                    w.classList.add('decrypting');
                    await new Promise(r => setTimeout(r, 30));
                    w.classList.add('revealed');
                    await new Promise(r => setTimeout(r, 40));
                }
            } else {
                await new Promise(r => setTimeout(r, 300));
                el.classList.add('visible');
            }
        }
    }
</script>
</body>
</html>
